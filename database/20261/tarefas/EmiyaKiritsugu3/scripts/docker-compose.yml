# ---------------------------------------------------------------------------
# docker-compose.yml — Ambiente MongoDB para Tarefa - MongoDB
# ---------------------------------------------------------------------------
# Uso:
#   docker compose up -d          (sobe servidor standalone)
#   docker compose -f docker-compose.yml -f docker-compose.rs.yml up -d   (replica set)
# ---------------------------------------------------------------------------

services:
  # ─── MongoDB Standalone ───────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb-atividades
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: AtividadesProj
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - mongo-net
    command: ["mongod", "--auth"]

volumes:
  mongodb_data:
    driver: local

networks:
  mongo-net:
    driver: bridge
